<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Produto</title>

    <link rel="stylesheet" href="style.css?v=20">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <header>

        <div class="logo">
            <a href="index.html">
                <img
                src="img/logo.jpg"
                alt="Oficina de Ícones São José"
            >
            </a>
        </div>

        <nav>
            <a href="index.html">Loja</a>
            <a href="carrinho.html">
                Carrinho (
                    <span id="contadorCarrinho">
                        0
                    </span>
                )
            </a>
        </nav>

    </header>

    <main class="produto-detalhe">

        <div class="produto-imagem">

            <img
                id="produtoImagem"
                src=""
                alt="Produto">

        </div>

        <div class="produto-info">

            <h1 id="produtoNome"></h1>

            <p>
                Tipo:
                <strong id="produtoTipo"></strong>
            </p>

            <br>

            <label for="tamanho">
                Tamanho
            </label>

            <select id="tamanho">

                <option value="P">P</option>

                <option value="M">M</option>

                <option value="G">G</option>

                <option value="ESP">ESP</option>

            </select>

            <br><br>

            <label>
                Quantidade
            </label>

            <div class="quantidade">

                <button id="menos">
                    -
                </button>

                <span id="quantidade">
                    1
                </span>

                <button id="mais">
                    +
                </button>

            </div>

            <br>

            <h2 id="preco">
                R$ 0,00
            </h2>

            <button
                id="btnCarrinho"
                class="btn-carrinho">

                Adicionar ao Carrinho

            </button>

        </div>

    </main>

    <footer>

        <div class="rodape-conteudo">
    
            <div class="rodape-marca">
                © 2026 Oficina de Ícones São José
            </div>
    
            <div class="rodape-redes">
    
                <a
                    href="https://instagram.com/seu_instagram"
                    target="_blank"
                >
                    <i class="fa-brands fa-instagram"></i>
                    Instagram
                </a>
    
                <a
                    href="https://wa.me/5598999999999"
                    target="_blank"
                >
                    <i class="fa-brands fa-whatsapp"></i>
                    WhatsApp
                </a>
    
            </div>
    
            <div class="rodape-info">
                Ícones Sacros Artesanais
            </div>
    
        </div>
    
    </footer>

    <script src="js/produto.js?v=2"></script>
    <script src="js/contador-carrinho.js?v=1"></script>

</body>

</html>
