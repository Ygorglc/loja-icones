<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Produto</title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

    <header>

        <div class="logo">
            <a href="index.html">
                <img src="img/logo.png" alt="Logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Loja</a>
            <a href="carrinho.html">Carrinho</a>
        </nav>

    </header>

    <main class="produto-detalhe">

        <div class="produto-imagem">

            <img
                id="produtoImagem"
                src=""
                alt="Produto">

        </div>

        <div class="produto-info">

            <h1 id="produtoNome"></h1>

            <p>
                Tipo:
                <strong id="produtoTipo"></strong>
            </p>

            <br>

            <label for="tamanho">
                Tamanho
            </label>

            <select id="tamanho">

                <option value="P">P</option>

                <option value="M">M</option>

                <option value="G">G</option>

                <option value="ESP">ESP</option>

            </select>

            <br><br>

            <label>
                Quantidade
            </label>

            <div class="quantidade">

                <button id="menos">
                    -
                </button>

                <span id="quantidade">
                    1
                </span>

                <button id="mais">
                    +
                </button>

            </div>

            <br>

            <h2 id="preco">
                R$ 0,00
            </h2>

            <button
                id="btnCarrinho"
                class="btn-carrinho">

                Adicionar ao Carrinho

            </button>

        </div>

    </main>

    <script src="js/produto.js"></script>

</body>

</html>
