<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Loja Ícones</title>

    <link rel="stylesheet" href="style.css?v=13">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <header>
        <div class="logo">
            <img
                src="img/logo.jpg"
                alt="Oficina de Ícones São José"
            >
        </div>

        <nav>
            <a href="#">Loja</a>
            <a href="#">Carrinho (0)</a>
        </nav>
    </header>

    <section class="slider">

        <div class="slide ativo">
            <img src="img/slide1.jpg" alt="Slide 1">
        </div>
    
        <div class="slide">
            <img src="img/slide2.jpg" alt="Slide 2">
        </div>
    
        <div class="slide">
            <img src="img/slide3.jpg" alt="Slide 3">
        </div>
    
    </section>

    <section class="filtros">

        <select id="filtroTipo">
            <option value="">Todos os tipos</option>
            <option value="tradicional">Tradicional</option>
            <option value="dourado">Dourado</option>
            <option value="especial">Especial</option>
        </select>
    
        <input
            type="text"
            id="filtroNome"
            placeholder="Pesquisar por nome..."
        >
    
        <button id="btnPesquisar">
            Pesquisar
        </button>
    
    </section>

        <section class="produtos">

    </section>

    <section class="paginacao">

        <button>Anterior</button>

        <span>1</span>

        <button>Próxima</button>

    </section>

    <footer>

        <div class="rodape-conteudo">
    
            <div class="rodape-marca">
                © 2026 Oficina de Ícones São José
            </div>
    
            <div class="rodape-redes">
    
                <a
                    href="https://instagram.com/seu_instagram"
                    target="_blank"
                >
                    <i class="fa-brands fa-instagram"></i>
                    Instagram
                </a>
    
                <a
                    href="https://wa.me/5598999999999"
                    target="_blank"
                >
                    <i class="fa-brands fa-whatsapp"></i>
                    WhatsApp
                </a>
    
            </div>
    
            <div class="rodape-info">
                Ícones Sacros Artesanais
            </div>
    
        </div>
    
    </footer>

    <script src="js/slider.js?v=1"></script>
    <script src="js/produtos.js?v=2"></script>
    <script src="js/carrinho.js?v=1"></script>

</body>

</html>
